<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}

/* Navbar */
.navbar {
    background-color: #0d6efd;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #1e293b;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #334155;
}

/* Cards */
.file-card {
    border-radius: 12px;
    transition: 0.3s;
}

.file-card:hover {
    transform: scale(1.02);
}

/* Upload Box */
.upload-box {
    border: 2px dashed #0d6efd;
    padding: 20px;
    border-radius: 10px;
    background: white;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand d-flex align-items-center">
        <img src="/static/logo.png" width="40" class="me-2">
        <strong>HARI BHAI.V.DESAI</strong>
    </span>
</nav>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
        <h5 class="text-center">Dashboard</h5>
        <a href="#">📁 All Files</a>
        <a href="#">⬆ Upload</a>
        <a href="#">👤 Profile</a>
        <a href="/">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

        <h3 class="mb-4">👨‍🏫 Teacher Panel</h3>

        <!-- Upload Section -->
        <div class="upload-box mb-4">
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-8">
                        <input type="file" name="file" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100">Upload File</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Files Grid -->
        <div class="row">
        {% for file in files %}
            <div class="col-md-4 mb-4">
                <div class="card file-card shadow-sm p-3">

                    <h5>📄 {{ file[1] }}</h5>
                    <p class="text-muted">Uploaded by {{ file[2] }}</p>

                    <div class="d-flex justify-content-between">
                        <a href="/download/{{ file[1] }}" class="btn btn-success btn-sm">Download</a>
                        <a href="/delete/{{ file[0] }}" class="btn btn-danger btn-sm">Delete</a>
                    </div>

                </div>
            </div>
        {% endfor %}
        </div>

    </div>
</div>
</div>

</body>
</html>
