<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: #1e3c72;
    color: white;
    padding: 20px;
    position: fixed;
    width: 230px;
}

.sidebar h4 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* Main */
.main {
    margin-left: 240px;
    padding: 20px;
}

/* Navbar */
.topbar {
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Cards */
.note-card {
    border-radius: 12px;
    transition: 0.3s;
}

.note-card:hover {
    transform: translateY(-5px);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🎓 HARI BHAI DESAI</h4>

    <a href="#">🏠 Dashboard</a>
    <a href="#">📂 My Notes</a>
    <a href="#">⭐ Favorites</a>
    <a href="#">⚙ Settings</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5>Student Dashboard</h5>
        <span>👤 {{ session['user'] }}</span>
    </div>

    <!-- FILTER SECTION -->
    <form method="GET" class="row mb-4">

        <div class="col">
            <select name="branch" class="form-control">
                <option value="">Branch</option>
                <option value="CS">CS</option>
                <option value="IT">IT</option>
                <option value="MECH">MECH</option>
                <option value="CIVIL">CIVIL</option>
            </select>
        </div>

        <div class="col">
            <select name="semester" class="form-control">
                <option value="">Semester</option>
                <option value="Sem1">Sem1</option>
                <option value="Sem2">Sem2</option>
                <option value="Sem3">Sem3</option>
                <option value="Sem4">Sem4</option>
            </select>
        </div>

        <div class="col">
            <input name="subject" class="form-control" placeholder="Search Subject">
        </div>

        <div class="col">
            <button class="btn btn-primary w-100">Filter</button>
        </div>

    </form>

    <!-- NOTES GRID -->
    <div class="row">

        {% for f in files %}
        <div class="col-md-4 mb-4">
            <div class="card note-card shadow-sm p-3">

                <h5 class="fw-bold">{{ f[5] }}</h5>

                <p class="text-muted">
                    {{ f[3] }} | {{ f[4] }}
                </p>

                <div class="d-flex justify-content-between">
                    <a href="/uploads/{{ f[1] }}" class="btn btn-success btn-sm">Download</a>
                    <button class="btn btn-outline-warning btn-sm">⭐</button>
                </div>

            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
