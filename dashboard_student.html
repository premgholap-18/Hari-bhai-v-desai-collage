<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}
.navbar {
    background-color: #198754;
}
.sidebar {
    height: 100vh;
    background: #111827;
    color: white;
    padding-top: 20px;
}
.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    text-decoration: none;
}
.sidebar a:hover {
    background: #374151;
}
.file-card {
    border-radius: 12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand d-flex align-items-center">
        <img src="/static/logo.png" width="40" class="me-2">
        <strong>HARI BHAI.V.DESAI</strong>
    </span>
</nav>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
        <h5 class="text-center">Student Panel</h5>
        <a href="#">📁 Notes</a>
        <a href="#">📚 Papers</a>
        <a href="/">🚪 Logout</a>
    </div>

    <!-- Main -->
    <div class="col-md-10 p-4">

        <h3 class="mb-4">🎓 Student Dashboard</h3>

        <div class="row">
        {% for file in files %}
            <div class="col-md-4 mb-4">
                <div class="card file-card shadow-sm p-3">

                    <h5>📄 {{ file[1] }}</h5>
                    <p class="text-muted">Uploaded by {{ file[2] }}</p>

                    <a href="/download/{{ file[1] }}" class="btn btn-primary btn-sm">Download</a>

                </div>
            </div>
        {% endfor %}
        </div>

    </div>
</div>
</div>

</body>
</html>
